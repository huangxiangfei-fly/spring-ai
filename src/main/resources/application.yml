server:
  port: 8080
  tomcat:
    # 禁用响应缓冲，确保 SSE 流式输出
    max-swallow-size: -1

spring:
  application:
    name: spring-ai-langchain4j
  main:
    allow-bean-definition-overriding: true
  ai:
    dashscope:
      # 你的阿里云 DashScope API Key，这里配置环境变量
      api-key: ${AI_DASHSCOPE_API_KEY:sk-c287a4b8bebb48afa3bbf2249af848e4}
      chat:
        options:
          model: glm-5
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3.5:35b

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-c287a4b8bebb48afa3bbf2249af848e4
      model-name: qwen-plus
      log-requests: true #请求消息日志
      log-responses: true #响应消息日志
      image-gen-model:
        api-key: sk-c287a4b8bebb48afa3bbf2249af848e4
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model-name: wan2.2-t2i-plus
      image-vl-model:
        api-key: sk-c287a4b8bebb48afa3bbf2249af848e4
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model-name: qwen3-vl-plus
      image-edit-model:
        api-key: sk-c287a4b8bebb48afa3bbf2249af848e4
        base-url: https://dashscope.aliyuncs.com/api/v1
        model-name: qwen-image-edit-plus

# 日志级别
logging:
  level:
    dev.langchain4j: INFO #日志级别
    com.alibaba.cloud.ai: DEBUG
    org.springframework.ai: DEBUG
    org:
      springframework:
          ai:
            chat:
              client:
                advisor:
                  SimpleLoggerAdvisor: DEBUG


