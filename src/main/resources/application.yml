server:
  port: 8080
  tomcat:
    # 禁用响应缓冲，确保 SSE 流式输出
    max-swallow-size: -1

spring:
  application:
    name: spring-ai-langchain4j
  main:
    allow-bean-definition-overriding: true
  # 解决SSE流式响应中文乱码
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/spring-ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0



  ai:
    dashscope:
      # 你的阿里云 DashScope API Key，这里配置环境变量
      api-key: ${AI_DASHSCOPE_API_KEY:sk-c287a4b8bebb48afa3bbf2249afxxxx}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3
      rerank:
        options:
          model: gte-rerank
