version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: spring-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root@123456
      MYSQL_DATABASE: spring-ai
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d   # 初始化 SQL 脚本目录
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot@123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-ai-net

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: spring-ai-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spring-ai-net

  # ==================== Spring Boot 应用 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-ai-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # 数据源配置（使用 docker-compose 服务名作为 host）
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/spring-ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root@123456
      # Redis 配置
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # 阿里云 DashScope API Key（建议通过 .env 文件传入）
      AI_DASHSCOPE_API_KEY: ${AI_DASHSCOPE_API_KEY:-sk-c287a4b8bebb48afa3bbf2249af848e4}
      # JVM 参数
      JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseG1GC
    volumes:
      - app_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spring-ai-net

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

# ==================== 网络配置 ====================
networks:
  spring-ai-net:
    driver: bridge
